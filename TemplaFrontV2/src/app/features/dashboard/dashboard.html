<div class="p-8 font-body">
  
  @if (isAdmin) {
    <header class="mb-8">
      <h1 class="text-3xl font-heading font-medium text-deep">Panel de Control</h1>
      <p class="text-muted">Visualización de métricas de TemplaRestaurante</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <span class="text-xs font-semibold text-primary uppercase">Ventas Hoy</span>
        <p class="text-2xl font-bold mt-2">$45.000</p>
      </div>
      </div>

  } @else {
    <div class="flex flex-col items-center justify-center h-[60vh] text-center">
      <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
        <span class="text-3xl">👋</span>
      </div>
      <h1 class="text-4xl font-heading font-medium text-deep mb-2">
        ¡Bienvenido, {{ username }}!
      </h1>
      <p class="text-muted text-lg max-w-md">
        Has ingresado con el rol de <span class="font-semibold text-primary">{{ role }}</span>. 
        Utilizá el menú lateral para gestionar la cocina o los pedidos.
      </p>
    </div>
  }

</div>
